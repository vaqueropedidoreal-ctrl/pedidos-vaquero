];

  admin:["hacer_pedidos","cambios_devoluciones","avanzar_estados","regresar_estados","ver_almacen","ver_logistica","ver_rutas","ver_desglose","exportar_excel","imprimir","panel_admin"],

};

const tienePerm = (u, p) => (u.permisos || PERMISOS_ROL[u.rol] || []).includes(p);

function AdminPanel({usuario, usuarios, mostrarNotif, s}) {
  const [nuevoNombre, setNuevoNombre] = React.useState("");
  const [nuevoPass, setNuevoPass] = React.useState("");
  const [nuevoRol, setNuevoRol] = React.useState("tienda");
  const [nuevoPermisos, setNuevoPermisos] = React.useState([...PERMISOS_ROL.tienda]);
  const [editando, setEditando] = React.useState(null);
  const [editData, setEditData] = React.useState({});

  const togglePerm = (lista, setLista, perm) => {
    setLista(prev => prev.includes(perm) ? prev.filter(p=>p!==perm) : [...prev, perm]);
  };

  const agregarUsuario = () => {
    if(!nuevoNombre||!nuevoPass){mostrarNotif("Completa nombre y contraseña","err");return;}
    const id = nuevoNombre.toLowerCase().replace(/[^a-z0-9]/g,"_")+Date.now();
    db.collection("usuarios").doc(id).set({nombre:nuevoNombre,password:nuevoPass,rol:nuevoRol,permisos:nuevoPermisos});
    setNuevoNombre(""); setNuevoPass(""); setNuevoRol("tienda"); setNuevoPermisos([...PERMISOS_ROL.tienda]);
    mostrarNotif(`✅ Usuario ${nuevoNombre} agregado`);
  };

  const eliminarUsuario = (id) => {
    if(id==="admin"){mostrarNotif("No puedes eliminar al admin","err");return;}
    if(!window.confirm("¿Eliminar este usuario?")) return;
    db.collection("usuarios").doc(id).delete();
    mostrarNotif("✅ Usuario eliminado");
  };

  const iniciarEdicion = (u) => {
    setEditando(u.id);
    setEditData({nombre:u.nombre, password:u.password, rol:u.rol, permisos:[...(u.permisos||PERMISOS_ROL[u.rol]||[])]});
  };

  const guardarEdicion = () => {
    db.collection("usuarios").doc(editando).update(editData);
    setEditando(null);
    mostrarNotif("✅ Usuario actualizado");
  };

  const coloresRol = {admin:"#dc2626",almacen:"#8b5cf6",chofer:"#f97316",tienda:"#3b82f6"};

  return (
    <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>

      {/* AGREGAR USUARIO */}
      <div style={{flex:1,minWidth:300,display:"flex",flexDirection:"column",gap:14}}>
        <div style={s.card}>
          <div style={s.ct}>➕ Agregar Usuario</div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
            <input type="text" placeholder="Nombre completo"
              style={{...s.sel,padding:"9px 12px"}}
              value={nuevoNombre} onChange={e=>setNuevoNombre(e.target.value)}/>
            <input type="text" placeholder="Contraseña"
              style={{...s.sel,padding:"9px 12px"}}
              value={nuevoPass} onChange={e=>setNuevoPass(e.target.value)}/>
            <select style={{...s.sel,padding:"9px 12px"}} value={nuevoRol}
              onChange={e=>{ setNuevoRol(e.target.value); setNuevoPermisos([...PERMISOS_ROL[e.target.value]||[]]); }}>
              <option value="tienda">📦 Tienda</option>
              <option value="almacen">🏭 Almacén</option>
              <option value="chofer">🚛 Chofer</option>
              <option value="admin">⚙️ Admin</option>
            </select>
          </div>
          <div style={{fontWeight:700,fontSize:12,color:"#374151",marginBottom:8}}>Permisos personalizados:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
            {PERMISOS_LIST.map(([key,label])=>(
              <div key={key}
                style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
                  background:nuevoPermisos.includes(key)?"#1a1a2e":"#f3f4f6",
                  color:nuevoPermisos.includes(key)?"#fbbf24":"#6b7280"}}
                onClick={()=>togglePerm(nuevoPermisos,setNuevoPermisos,key)}>
                {label}
              </div>
            ))}
          </div>
          <button style={{...s.bwsp,marginTop:0}} onClick={agregarUsuario}>+ Agregar Usuario</button>
        </div>
      </div>

      {/* LISTA USUARIOS */}
      <div style={{flex:1,minWidth:300,display:"flex",flexDirection:"column",gap:14}}>
        <div style={s.card}>
          <div style={s.ct}>👥 Usuarios ({usuarios.length})</div>
          {usuarios.map(u=>(
            <div key={u.id} style={{padding:"12px 0",borderBottom:"1px solid #f3f4f6"}}>
              {editando===u.id ? (
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  <input type="text" style={{...s.sel,padding:"7px 10px",fontSize:12}}
                    value={editData.nombre} onChange={e=>setEditData(d=>({...d,nombre:e.target.value}))}/>
                  <input type="text" placeholder="Nueva contraseña" style={{...s.sel,padding:"7px 10px",fontSize:12}}
                    value={editData.password} onChange={e=>setEditData(d=>({...d,password:e.target.value}))}/>
                  <select style={{...s.sel,padding:"7px 10px",fontSize:12}} value={editData.rol}
                    onChange={e=>setEditData(d=>({...d,rol:e.target.value,permisos:[...PERMISOS_ROL[e.target.value]||[]]}))}>
                    <option value="tienda">📦 Tienda</option>
                    <option value="almacen">🏭 Almacén</option>
                    <option value="chofer">🚛 Chofer</option>
                    <option value="admin">⚙️ Admin</option>
                  </select>
                  <div style={{fontWeight:700,fontSize:11,color:"#374151",marginTop:4}}>Permisos:</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {PERMISOS_LIST.map(([key,label])=>(
                      <div key={key}
                        style={{padding:"3px 8px",borderRadius:20,fontSize:10,fontWeight:600,cursor:"pointer",
                          background:editData.permisos.includes(key)?"#1a1a2e":"#f3f4f6",
                          color:editData.permisos.includes(key)?"#fbbf24":"#6b7280"}}
                        onClick={()=>setEditData(d=>({...d,permisos:d.permisos.includes(key)?d.permisos.filter(p=>p!==key):[...d.permisos,key]}))}>
                        {label}
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:6,marginTop:6}}>
                    <button style={{...s.bwsp,marginTop:0,flex:1,padding:"8px"}} onClick={guardarEdicion}>✅ Guardar</button>
                    <button style={{...s.br,flex:1}} onClick={()=>setEditando(null)}>Cancelar</button>
                  </div>
                </div>
              ) : (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:"#1a1a2e"}}>👤 {u.nombre}</div>
                    <div style={{fontSize:11,marginTop:2}}>
                      <span style={{fontWeight:700,color:coloresRol[u.rol]||"#374151"}}>{u.rol}</span>
                      <span style={{color:"#9ca3af"}}> · Clave: {u.password}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>
                      {(u.permisos||PERMISOS_ROL[u.rol]||[]).map(p=>{
                        const label = PERMISOS_LIST.find(x=>x[0]===p);
                        return label ? <span key={p} style={{background:"#f3f4f6",borderRadius:20,padding:"2px 7px",fontSize:9,color:"#374151"}}>{label[1]}</span> : null;
                      })}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,flexShrink:0}}>
                    <button style={{...s.ba,fontSize:11,padding:"4px 8px"}} onClick={()=>iniciarEdicion(u)}>✏️ Editar</button>
                    {u.id!=="admin"&&<button style={{...s.br,fontSize:11,padding:"4px 8px"}} onClick={()=>eliminarUsuario(u.id)}>🗑️</button>}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

  const [tienda, setTienda] = useState(TIENDAS[0]);
  const [carrito, setCarrito] = useState({});
  const [pedidos, setPedidos] = useState([]);
  const [notif, setNotif] = useState(null);

  // Firebase realtime listeners
  React.useEffect(() => {
    const unsubPedidos = db.collection("pedidos")
      .orderBy("timestamp", "desc")
      .onSnapshot(snap => {
        setPedidos(snap.docs.map(d => ({id: d.id, ...d.data()})));
      });
    const unsubCambios = db.collection("cambios")
      .orderBy("timestamp", "desc")
      .onSnapshot(snap => {
        setCambios(snap.docs.map(d => ({id: d.id, ...d.data()})));
      });
    return () => { unsubPedidos(); unsubCambios(); };
  }, []);

  // LOGIN STATES
  const USUARIOS_DEFAULT = [{id:"admin",nombre:"Edgar (Admin)",password:"vaquero2024",rol:"admin"}];
  const [usuario, setUsuario] = useState(null);
  const [usuarios, setUsuarios] = useState(USUARIOS_DEFAULT);
  const [loginUser, setLoginUser] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginError, setLoginError] = useState("");

  React.useEffect(()=>{
    const unsubU = db.collection("usuarios").onSnapshot(snap=>{
      if(snap.docs.length>0) setUsuarios(snap.docs.map(d=>({id:d.id,...d.data()})));
      else db.collection("usuarios").doc("admin").set(USUARIOS_DEFAULT[0]);
    });
    return ()=>unsubU();
  },[]);

  const handleLogin = () => {
    const u = usuarios.find(x=>x.nombre.toLowerCase().includes(loginUser.toLowerCase()) && x.password===loginPass);
    if(u){ setUsuario(u); setLoginError(""); }
    else setLoginError("Usuario o contraseña incorrectos");
  };

  const [detalle, setDetalle] = useState(null);
  const [editPedido, setEditPedido] = useState(null);
  const [envioTiendas, setEnvioTiendas] = useState([]);
  const [envioIniciado, setEnvioIniciado] = useState(false);
  const [editProds, setEditProds] = useState([]);
  const hoy = new Date().toISOString().split("T")[0];
  const [fechaFiltro, setFechaFiltro] = useState(hoy);
  const [cambios, setCambios] = useState([]);
  const [tipoCambio, setTipoCambio] = useState("devolucion");
  const [notaCambio, setNotaCambio] = useState("");
  const [itemsCambio, setItemsCambio] = useState([]);
  const [prodTemp, setProdTemp] = useState("");
  const [cantTemp, setCantTemp] = useState(1);

  const mostrarNotif = (msg, tipo="ok") => { setNotif({msg,tipo}); setTimeout(()=>setNotif(null),3500); };
  const add = (p) => setCarrito(c=>({...c,[p.id]:(c[p.id]||0)+1}));
  const sub = (p) => setCarrito(c=>{ const n={...c}; if(n[p.id]>1)n[p.id]--; else delete n[p.id]; return n; });
  const total = Object.values(carrito).reduce((a,b)=>a+b,0);

  // Filter pedidos by selected date or show all pending
  const pedidosFiltrados = fechaFiltro === "todos"
    ? pedidos.filter(p => p.estado !== "entregado")
    : pedidos.filter(p => {
        if(!p.timestamp) return true;
        const fechaPedido = p.timestamp.toDate ? p.timestamp.toDate().toISOString().split("T")[0] : hoy;
        return fechaPedido === fechaFiltro;
      });

  const enviar = async () => {
    const items = Object.entries(carrito).map(([id,cantidad])=>{
      const p = PRODUCTOS.find(x=>x.id===parseInt(id));
      return {nombre:p.nombre,unidad:p.unidad,cantidad};
    });
    if(!items.length){ mostrarNotif("Agrega productos al pedido","err"); return; }
    const hora=genHora(), ruta=getRuta(tienda);
    const nuevo={tienda,hora,estado:"pendiente",productos:items.map(i=>({nombre:i.nombre,cantidad:i.cantidad})),chofer:"Sin asignar",ruta,creadoPor:usuario.nombre,historial:[{accion:"Pedido creado",usuario:usuario.nombre,hora}],timestamp:firebase.firestore.FieldValue.serverTimestamp()};
    const ref = await db.collection("pedidos").add(nuevo);
    const id = "DLF-" + ref.id.slice(-6).toUpperCase();
    await ref.update({displayId: id});
    setCarrito({});
    const lineas=items.map(i=>`• ${i.nombre} — ${i.cantidad} ${i.unidad}`).join("\n");
    const msg=`🤠 PEDIDO VAQUERO — ${id}\n📍 ${tienda}\n🕐 ${hora}\n\n${lineas}\n\n📦 ${ruta}`;
    navigator.clipboard.writeText(msg).catch(()=>{});
    mostrarNotif(`✅ Pedido guardado → ${ruta}`);
  };

  const avanzar = (pid) => {
    const orden=["pendiente","confirmado","en_carga","en_ruta","entregado"];
    const p = pedidos.find(x=>x.id===pid);
    if(!p) return;
    const next=orden[Math.min(orden.indexOf(p.estado)+1,orden.length-1)];
    const horaAct = new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
    db.collection("pedidos").doc(pid).update({
      estado:next,
      [`ultimaActualizacion`]: {usuario:usuario.nombre, accion:`→ ${ESTADOS[next].label}`, hora:horaAct}
    });
  };

  const regresar = (pid) => {
    const orden=["pendiente","confirmado","en_carga","en_ruta","entregado"];
    const p = pedidos.find(x=>x.id===pid);
    if(!p) return;
    const prev=orden[Math.max(orden.indexOf(p.estado)-1,0)];
    const horaReg = new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
    db.collection("pedidos").doc(pid).update({
      estado:prev,
      [`ultimaActualizacion`]: {usuario:usuario.nombre, accion:`← ${ESTADOS[prev].label}`, hora:horaReg}
    });
    mostrarNotif(`↩️ Regresado a ${ESTADOS[prev].label}`);
  };

  const iniciarModoEnvio = () => {
    const tiendasData = pedidos
      .filter(p => p.estado !== "entregado")
      .map(p => ({
        id: p.id,
        tienda: p.tienda,
        ruta: p.ruta || "Sin ruta",
        activa: true,
        productos: (p.productos || []).map(pr => ({ ...pr, tachado: false }))
      }));
    setEnvioTiendas(tiendasData);
    setEnvioIniciado(true);
  };

  const abrirEdicion = (pid) => {
    const p = pedidos.find(x=>x.id===pid);
    if(!p){ mostrarNotif("No se encontró el pedido","err"); return; }
    setEditPedido(p);
    setEditProds((p.productos||[]).map(x=>({...x})));
  };

  const guardarEdicionPedido = () => {
    const horaEdit = genHora();
    db.collection("pedidos").doc(editPedido.id).update({
      productos: editProds.filter(x=>x.cantidad>0),
      ultimaActualizacion: {usuario:usuario.nombre, accion:"✏️ Pedido editado", hora:horaEdit}
    });
    setEditPedido(null);
    mostrarNotif("✅ Pedido actualizado");
  };

  const exportarExcel = () => {
    const fecha = new Date().toLocaleDateString("es-MX");

    // ===== HOJA 1: DESGLOSE (como hoja física) =====
    const pendientes = pedidos.filter(p=>p.estado!=="entregado");
    const prodUsados = [...new Set(pedidos.flatMap(p=>p.productos.map(x=>x.nombre)))];

    // Header row
    const headerRow = ["#","DULCERÍA","RUTA",...prodUsados,"ESTADO","CAMBIOS"];
    const dataRows = pendientes.map((p,i)=>{
      const row = [i+1, p.tienda.replace("DULFI ","").replace("MEGA ",""), p.ruta];
      prodUsados.forEach(prod=>{
        const found = p.productos.find(x=>x.nombre===prod);
        row.push(found ? found.cantidad : "");
      });
      row.push(ESTADOS[p.estado].label);
      // Cambios de esta tienda
      const camb = cambios.filter(x=>x.tienda===p.tienda);
      row.push(camb.length>0 ? camb.map(x=>`${x.tipo.toUpperCase()}: ${x.productos.map(pr=>`${pr.producto} x${pr.cantidad}`).join(", ")}`).join(" | ") : "");
      return row;
    });

    // Totales row
    const totalesRow = ["","TOTAL","",...prodUsados.map(prod=>pendientes.reduce((sum,p)=>{
      const f=p.productos.find(x=>x.nombre===prod); return sum+(f?f.cantidad:0);
    },0)),"",""];

    const wsDesglose = XLSX.utils.aoa_to_sheet([headerRow,...dataRows,totalesRow]);

    // Column widths
    wsDesglose["!cols"] = [
      {wch:4},{wch:18},{wch:16},
      ...prodUsados.map(()=>({wch:12})),
      {wch:12},{wch:40}
    ];

    // Style header row bold
    const range = XLSX.utils.decode_range(wsDesglose["!ref"]);
    for(let C=range.s.c; C<=range.e.c; C++){
      const cell = wsDesglose[XLSX.utils.encode_cell({r:0,c:C})];
      if(cell) cell.s = {font:{bold:true},fill:{fgColor:{rgb:"1a1a2e"}},alignment:{horizontal:"center"}};
    }

    // ===== HOJA 2: PEDIDOS DETALLE =====
    const rowsPedidos = pedidos.flatMap(p=>p.productos.map(prod=>({
      "Fecha":fecha,"Tienda":p.tienda,"Hora":p.hora,
      "Producto":prod.nombre,"Cantidad":prod.cantidad,
      "Estado":ESTADOS[p.estado].label,"Ruta":p.ruta,
      "Creado por":p.creadoPor||""
    })));
    const wsPedidos = XLSX.utils.json_to_sheet(rowsPedidos);
    wsPedidos["!cols"]=[{wch:12},{wch:28},{wch:8},{wch:36},{wch:10},{wch:12},{wch:18},{wch:16}];

    // ===== HOJA 3: CAMBIOS Y DEVOLUCIONES =====
    const rowsCambios = cambios.flatMap(x=>x.productos.map(p=>({
      "Fecha":fecha,"Hora":x.hora,"Tienda":x.tienda,
      "Tipo":x.tipo.toUpperCase(),"Producto":p.producto,
      "Cantidad":p.cantidad,"Nota":x.nota||"","Registrado por":x.registradoPor||""
    })));
    const wsCambios = XLSX.utils.json_to_sheet(rowsCambios.length?rowsCambios:[{"Fecha":"Sin registros","Hora":"","Tienda":"","Tipo":"","Producto":"","Cantidad":"","Nota":"","Registrado por":""}]);
    wsCambios["!cols"]=[{wch:12},{wch:8},{wch:28},{wch:14},{wch:36},{wch:10},{wch:24},{wch:16}];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, wsDesglose, "Desglose Tijuana");
    XLSX.utils.book_append_sheet(wb, wsPedidos, "Pedidos Detalle");
    XLSX.utils.book_append_sheet(wb, wsCambios, "Cambios y Devoluciones");
    XLSX.writeFile(wb, `Desglose_Vaquero_${fecha.replace(/\//g,"-")}.xlsx`);
    mostrarNotif("✅ Excel descargado — 3 hojas");
  };

  const Btn = ({pid,estado}) => (
    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
      {estado!=="entregado"&&<button style={s.ba} onClick={()=>avanzar(pid)}>Avanzar →</button>}
      {estado!=="pendiente"&&<button style={s.br} onClick={()=>regresar(pid)}>← Regresar</button>}
    </div>
  );

  // LOGIN SCREEN
  if(!usuario) return (
    <div style={{minHeight:"100vh",background:"#1a1a2e",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif"}}>
      <div style={{background:"#fff",borderRadius:16,padding:36,width:"90%",maxWidth:380,boxShadow:"0 8px 40px #0004"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>🤠</div>
          <div style={{fontWeight:900,fontSize:22,color:"#1a1a2e",letterSpacing:2}}>PEDIDOS VAQUERO</div>
          <div style={{fontSize:12,color:"#9ca3af",marginTop:4}}>Mashari S.A. de C.V.</div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>Usuario</div>
          <input type="text" placeholder="Tu nombre"
            style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e5e7eb",fontFamily:"inherit",fontSize:14}}
            value={loginUser} onChange={e=>setLoginUser(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          />
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>Contraseña</div>
          <input type="password" placeholder="••••••••"
            style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #e5e7eb",fontFamily:"inherit",fontSize:14}}
            value={loginPass} onChange={e=>setLoginPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&handleLogin()}
          />
        </div>
        {loginError&&<div style={{color:"#dc2626",fontSize:12,marginBottom:12,textAlign:"center"}}>{loginError}</div>}
        <button style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#1a1a2e",color:"#fbbf24",fontWeight:800,fontSize:15,cursor:"pointer",fontFamily:"inherit"}}
          onClick={handleLogin}>Entrar</button>
      </div>
    </div>
  );

  return (
    <div style={s.root}>
      {notif&&<div style={{...s.notif,background:notif.tipo==="err"?"#fee2e2":"#d1fae5",color:notif.tipo==="err"?"#dc2626":"#065f46"}}>{notif.msg}</div>}

      <header style={s.header}>
        <div style={s.logo}>
          <div>
            <div style={s.logoT}>PEDIDOS VAQUERO</div>
            <div style={s.logoS}>Mashari S.A. de C.V. · Tijuana B.C.</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{color:"#fbbf24",fontSize:12,fontWeight:700}}>👤 {usuario.nombre}</div>
          <div style={{background:"#ffffff18",color:"#94a3b8",borderRadius:20,padding:"2px 10px",fontSize:11}}>{usuario.rol}</div>
          <button style={{padding:"5px 12px",borderRadius:7,border:"none",background:"#fee2e2",color:"#dc2626",fontWeight:700,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}
            onClick={()=>setUsuario(null)}>Salir</button>
        </div>
        <nav style={s.nav} className="no-print">
          {[{k:"tienda",l:"📦 Tienda"},{k:"almacen",l:"🏭 Almacén"},{k:"logistica",l:"🚛 Logística"},{k:"rutas",l:"🗺️ Rutas"},{k:"desglose",l:"📊 Desglose"},{k:"envio",l:"🚛 Modo Envío"},...(usuario.rol==="admin"?[{k:"admin",l:"⚙️ Admin"}]:[])].map(v=>(
            <button key={v.k} style={{...s.nb,...(vista===v.k?s.nba:{})}} onClick={()=>setVista(v.k)}>{v.l}</button>
          ))}
        </nav>
      </header>

      <main style={s.main}>

        {vista==="tienda"&&(
          <div style={s.cols}>
            <div style={s.col}>
              <div style={s.card}>
                <div style={s.ct}>Seleccionar Dulcería</div>
                <select style={s.sel} value={tienda} onChange={e=>setTienda(e.target.value)}>
                  {TIENDAS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div style={s.card}>
                <div style={s.ct}>Catálogo de Productos</div>
                <div style={s.grid}>
                  {PRODUCTOS.map(p=>(
                    <div key={p.displayId||p.id} style={s.pc}>
                      <div style={s.pn}>{p.nombre}</div>
                      <div style={s.pu}>{p.unidad}</div>
                      <div style={s.ctrl}>
                        <button style={s.bm} onClick={()=>sub(p)}>−</button>
                        <input
                          type="number" min="0"
                          style={{width:48,textAlign:"center",fontWeight:800,fontSize:15,border:"1.5px solid #e5e7eb",borderRadius:6,padding:"2px 4px",fontFamily:"inherit",color:"#1a1a2e"}}
                          value={carrito[p.id]||0}
                          onChange={e=>{
                            const v=parseInt(e.target.value)||0;
                            if(v<=0) setCarrito(c=>{const n={...c};delete n[p.id];return n;});
                            else setCarrito(c=>({...c,[p.id]:v}));
                          }}
                        />
                        <button style={s.bp} onClick={()=>add(p)}>+</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
            <div style={{...s.col,maxWidth:320}}>
              <div style={s.card}>
                <div style={s.ct}>🛒 Pedido Actual</div>
                <div style={s.ctienda}>{tienda}</div>
                <div style={s.rutaTag}>🗺️ Ruta sugerida: <strong>{getRuta(tienda)}</strong></div>
                {!Object.keys(carrito).length
                  ?<div style={s.empty}>Sin productos aún</div>
                  :Object.entries(carrito).map(([id,qty])=>{
                    const p=PRODUCTOS.find(x=>x.id===parseInt(id));
                    return <div key={id} style={s.ci}><span>{p.nombre}</span><strong>{qty} bultos</strong></div>;
                  })
                }
                <button style={s.bwsp} onClick={enviar}>📋 Enviar a Almacén + Copiar WhatsApp ({total} bultos)</button>
              </div>
              <div style={s.card}>
                <div style={s.ct}>🔄 Cambios / Devoluciones</div>
                {/* Tipo y nota */}
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <select style={{...s.sel,flex:1,padding:"7px 8px"}} value={tipoCambio} onChange={e=>setTipoCambio(e.target.value)}>
                    <option value="devolucion">🔙 Devolución</option>
                    <option value="cambio">🔄 Cambio</option>
                    <option value="faltante">⚠️ Faltante</option>
                  </select>
                </div>
                {/* Agregar productos al cambio */}
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  <select style={{...s.sel,flex:1,padding:"7px 8px"}} value={prodTemp} onChange={e=>setProdTemp(e.target.value)}>
                    <option value="">— Producto —</option>
                    {PRODUCTOS.map(p=><option key={p.displayId||p.id} value={p.nombre}>{p.nombre}</option>)}
                  </select>
                  <input type="number" min="1"
                    style={{width:55,textAlign:"center",fontWeight:700,border:"1.5px solid #e5e7eb",borderRadius:8,padding:"7px 4px",fontFamily:"inherit"}}
                    value={cantTemp}
                    onChange={e=>setCantTemp(parseInt(e.target.value)||1)}
                  />
                  <button style={{...s.bp,width:36,height:36,borderRadius:8,fontSize:20}} onClick={()=>{
                    if(!prodTemp) return;
                    const existe = itemsCambio.find(x=>x.producto===prodTemp);
                    if(existe) setItemsCambio(prev=>prev.map(x=>x.producto===prodTemp?{...x,cantidad:x.cantidad+cantTemp}:x));
                    else setItemsCambio(prev=>[...prev,{producto:prodTemp,cantidad:cantTemp}]);
                    setProdTemp(""); setCantTemp(1);
                  }}>+</button>
                </div>
                {/* Lista de productos agregados */}
                {itemsCambio.length>0&&(
                  <div style={{background:"#f8f7f4",borderRadius:8,padding:"8px 10px",marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:700,color:"#6b7280",marginBottom:6}}>Productos a registrar:</div>
                    {itemsCambio.map((x,i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,padding:"3px 0",borderBottom:"1px solid #e5e7eb"}}>
                        <span>{x.producto} ×{x.cantidad}</span>
                        <button style={{border:"none",background:"none",color:"#dc2626",cursor:"pointer",fontSize:14,fontWeight:800}}
                          onClick={()=>setItemsCambio(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
                      </div>
                    ))}
                  </div>
                )}
                <input type="text" placeholder="Nota (opcional)"
                  style={{...s.sel,padding:"7px 10px",marginBottom:8}}
                  value={notaCambio}
                  onChange={e=>setNotaCambio(e.target.value)}
                />
                <button style={{...s.bwsp,marginTop:0,background:"#f97316"}} onClick={()=>{
                  if(!itemsCambio.length){mostrarNotif("Agrega al menos un producto","err");return;}
                  const reg={id:Date.now(),tipo:tipoCambio,tienda,hora:genHora(),productos:itemsCambio,nota:notaCambio};
                  setCambios(prev=>[reg,...prev]);
                  setItemsCambio([]); setNotaCambio(""); setProdTemp(""); setCantTemp(1);
                  mostrarNotif(`✅ ${tipoCambio} registrado — ${itemsCambio.length} producto(s)`);
                }}>✓ Registrar {tipoCambio} ({itemsCambio.length} productos)</button>

                {/* Historial de cambios */}
                {cambios.filter(x=>x.tienda===tienda).length>0&&(
                  <div style={{marginTop:12}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#f97316",marginBottom:6}}>Registros de {tienda.replace("DULFI ","").replace("MEGA ","")}:</div>
                    {cambios.filter(x=>x.tienda===tienda).map(x=>(
                      <div key={x.id} style={{padding:"8px 0",borderBottom:"1px solid #f3f4f6"}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontWeight:700,fontSize:12,color:x.tipo==="devolucion"?"#dc2626":x.tipo==="cambio"?"#3b82f6":"#f59e0b"}}>
                            {x.tipo==="devolucion"?"🔙":x.tipo==="cambio"?"🔄":"⚠️"} {x.tipo.toUpperCase()}
                          </span>
                          <span style={{fontSize:10,color:"#9ca3af"}}>{x.hora}</span>
                        </div>
                        {x.productos.map((p,i)=>(
                          <div key={i} style={{fontSize:11,color:"#374151",paddingLeft:8}}>• {p.producto} ×{p.cantidad}</div>
                        ))}
                        {x.nota&&<div style={{fontSize:11,color:"#9ca3af",paddingLeft:8,marginTop:2}}>{x.nota}</div>}
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div style={s.card}>
                <div style={s.ct}>Mis Pedidos Recientes</div>
                {pedidosFiltrados.filter(p=>p.tienda===tienda).slice(0,5).length===0
                  ?<div style={s.empty}>Sin pedidos de esta tienda</div>
                  :pedidosFiltrados.filter(p=>p.tienda===tienda).slice(0,5).map(p=>(
                    <div key={p.displayId||p.id} style={s.pr} onClick={()=>setDetalle(p)}>
                      <div><div style={s.pid}>{p.displayId||p.id}</div><div style={s.ph}>{p.hora}</div></div>
                      <span style={{...s.badge,background:ESTADOS[p.estado].bg,color:ESTADOS[p.estado].color}}>{ESTADOS[p.estado].label}</span>
                    </div>
                  ))
                }
              </div>
            </div>
          </div>
        )}

          prodUsados.forEach(prod => {
            totalesFijos[prod] = tiendasActivas.reduce((sum, t) => {
              const f = t.productos.find(p => p.nombre === prod);

              const f = t.productos.find(p => p.nombre === prod && !p.tachado);

                  <div style={{textAlign:"center"}}>
                    <div style={{color:"#fbbf24",fontWeight:900,fontSize:24}}>{totalGeneral}</div>
                    <div style={{color:"#94a3b8",fontSize:10}}>TOTAL</div>
                  </div>
                  <div style={{width:1,height:36,background:"#ffffff22"}}/>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:"#10b981",fontWeight:900,fontSize:24}}>{totalCargado}</div>
                    <div style={{color:"#94a3b8",fontSize:10}}>CARGADO</div>
                  </div>
                  <div style={{width:1,height:36,background:"#ffffff22"}}/>
                  <div style={{textAlign:"center"}}>
                    <div style={{color:"#f97316",fontWeight:900,fontSize:24}}>{totalPendiente}</div>
                    <div style={{color:"#94a3b8",fontSize:10}}>PENDIENTE</div>
                  </div>
                  <button style={{...s.br,fontSize:11}} onClick={()=>setEnvioIniciado(false)}>↩️ Reiniciar</button>
                </div>
              </div>

              {/* Selector tiendas */}
              <div style={s.card}>
                <div style={s.ct}>🏪 Tiendas en esta carga — toca para quitar/agregar</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {envioTiendas.map(t=>(
                    <div key={t.id} onClick={()=>toggleEnvioTienda(t.id)} style={{
                      padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:700,
                      border:"2px solid",transition:"all .15s",
                      borderColor:tiendaCompleta(t)&&t.activa?"#10b981":t.activa?"#1a1a2e":"#e5e7eb",
                      background:tiendaCompleta(t)&&t.activa?"#d1fae5":t.activa?"#1a1a2e":"#f3f4f6",
                      color:tiendaCompleta(t)&&t.activa?"#065f46":t.activa?"#fbbf24":"#9ca3af",
                      textDecoration:tiendaCompleta(t)&&t.activa?"line-through":"none",
                    }}>
                      {tiendaCompleta(t)&&t.activa?"✅ ":!t.activa?"✕ ":""}{t.tienda.replace("DULFI ","").replace("MEGA ","")}
                    </div>
                  ))}
                </div>
              </div>

              {/* Tabla interactiva */}
              <div style={s.card}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"#1a1a2e"}}>
                        <th style={{...s.th,color:"#fbbf24",textAlign:"left"}}>#</th>
                        <th style={{...s.th,color:"#fbbf24",textAlign:"left"}}>DULCERÍA</th>
                        {prodUsados.map(p=><th key={p} style={{...s.th,color:"#fbbf24",textAlign:"center",fontSize:10}}>{p.replace(" Vaquero","").replace("Churritos ","Ch. ").replace("Fritura Surtida","Frit.").trim()}</th>)}
                        <th style={{...s.th,color:"#fbbf24",textAlign:"center"}}>ESTADO</th>
                      </tr>
                    </thead>
                    <tbody>
                      {tiendasActivas.map((t,i)=>(
                        <tr key={t.id} style={{borderBottom:"1px solid #f3f4f6",background:tiendaCompleta(t)?"#f0fdf4":i%2===0?"#fff":"#fafafa"}}>
                          <td style={{...s.td,color:"#9ca3af",fontWeight:700}}>{i+1}</td>
                          <td style={{...s.td,fontWeight:700,whiteSpace:"nowrap"}}>
                            <div style={{color:"#1a1a2e",textDecoration:tiendaCompleta(t)?"line-through":"none",opacity:tiendaCompleta(t)?0.5:1}}>
                              {t.tienda.replace("DULFI ","").replace("MEGA ","")}
                            </div>
                            <div style={{fontSize:9,color:"#9ca3af"}}>{t.ruta}</div>
                          </td>
                          {prodUsados.map(prod=>{
                            const f=t.productos.find(p=>p.nombre===prod);
                            return (
                              <td key={prod} style={{...s.td,textAlign:"center"}} onClick={()=>f&&toggleEnvioProd(t.id,prod)}>
                                {f?(
                                  <span style={{
                                    display:"inline-block",fontWeight:800,fontSize:14,
                                    color:f.tachado?"#10b981":"#1a1a2e",
                                    textDecoration:f.tachado?"line-through":"none",
                                    cursor:"pointer",padding:"4px 8px",borderRadius:6,
                                    background:f.tachado?"#d1fae5":"#f3f4f6",
                                    minWidth:36,transition:"all .15s",userSelect:"none"
                                  }}>{f.cantidad}</span>
                                ):<span style={{color:"#e5e7eb"}}>—</span>}
                              </td>
                            );
                          })}
                          <td style={{...s.td,textAlign:"center"}}>
                            {tiendaCompleta(t)
                              ?<span style={{background:"#d1fae5",color:"#065f46",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>✅ Listo</span>
                              :t.productos.some(p=>p.tachado)
                                ?<span style={{background:"#ffedd5",color:"#c2410c",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>⏳ Parcial</span>
                                :<span style={{background:"#fef3c7",color:"#92400e",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>Pendiente</span>
                            }
                          </td>
                        </tr>
                      ))}
                      {/* TOTAL GENERAL fijo */}
                      <tr style={{background:"#fef3c7",borderTop:"2px solid #f59e0b"}}>
                        <td style={{...s.td,fontWeight:900,color:"#92400e"}} colSpan={2}>📦 TOTAL GENERAL</td>
                        {prodUsados.map(prod=>(
                          <td key={prod} style={{...s.td,textAlign:"center",fontWeight:900,color:"#92400e",fontSize:15}}>{totalesFijos[prod]||"—"}</td>
                        ))}
                        <td style={s.td}></td>
                      </tr>
                      {/* CARGADO */}
                      <tr style={{background:"#d1fae5",borderTop:"1px solid #6ee7b7"}}>
                        <td style={{...s.td,fontWeight:900,color:"#065f46"}} colSpan={2}>✅ CARGADO</td>
                        {prodUsados.map(prod=>{
                          const cargado=tiendasActivas.reduce((sum,t)=>{const f=t.productos.find(p=>p.nombre===prod&&p.tachado);return sum+(f?f.cantidad:0);},0);
                          return <td key={prod} style={{...s.td,textAlign:"center",fontWeight:900,color:"#065f46",fontSize:15}}>{cargado>0?cargado:<span style={{color:"#9ca3af",fontWeight:400}}>—</span>}</td>;
                        })}
                        <td style={s.td}></td>
                      </tr>
                      {/* PENDIENTE */}
                      <tr style={{background:"#ffedd5",borderTop:"1px solid #fed7aa"}}>
                        <td style={{...s.td,fontWeight:900,color:"#c2410c"}} colSpan={2}>⏳ PENDIENTE</td>
                        {prodUsados.map(prod=>(
                          <td key={prod} style={{...s.td,textAlign:"center",fontWeight:900,color:"#c2410c",fontSize:15}}>
                            {totalesPendientes[prod]>0?totalesPendientes[prod]:<span style={{textDecoration:"line-through",color:"#10b981"}}>0</span>}
                          </td>
                        ))}
                        <td style={s.td}></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ===== ADMIN ===== */}}
        {vista==="admin" && usuario.rol==="admin" && <AdminPanel usuario={usuario} usuarios={usuarios} mostrarNotif={mostrarNotif} s={s} />}

      </main>

      {/* MODAL EDITAR PEDIDO */}
      {editPedido&&(
        <div style={s.ov} onClick={()=>setEditPedido(null)}>
          <div style={{...s.modal, maxWidth:500}} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:16,color:"#1a1a2e",marginBottom:4}}>✏️ Editar Pedido</div>
            <div style={{fontSize:12,color:"#6b7280",marginBottom:16}}>{editPedido.tienda} · {editPedido.hora}</div>
            {editProds.map((prod,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #f3f4f6"}}>
                <div style={{fontSize:12,fontWeight:600,color:"#374151",flex:1}}>{prod.nombre}</div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button style={s.bm} onClick={()=>setEditProds(prev=>prev.map((x,j)=>j===i?{...x,cantidad:Math.max(0,x.cantidad-1)}:x))}>−</button>
                  <input type="number" min="0"
                    style={{width:55,textAlign:"center",fontWeight:800,fontSize:15,border:"1.5px solid #e5e7eb",borderRadius:6,padding:"2px 4px",fontFamily:"inherit"}}
                    value={prod.cantidad}
                    onChange={e=>setEditProds(prev=>prev.map((x,j)=>j===i?{...x,cantidad:parseInt(e.target.value)||0}:x))}
                  />
                  <button style={s.bp} onClick={()=>setEditProds(prev=>prev.map((x,j)=>j===i?{...x,cantidad:x.cantidad+1}:x))}>+</button>
                </div>
              </div>
            ))}
            {/* Agregar producto nuevo al pedido */}
            <div style={{marginTop:12,paddingTop:12,borderTop:"2px dashed #f3f4f6"}}>
              <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:8}}>Agregar producto:</div>
              <div style={{display:"flex",gap:6}}>
                <select id="prod-add-sel" style={{...s.sel,flex:1,padding:"7px 8px",fontSize:12}}>
                  {PRODUCTOS.filter(p=>!editProds.find(x=>x.nombre===p.nombre)).map(p=>(
                    <option key={p.id} value={p.nombre}>{p.nombre}</option>
                  ))}
                </select>
                <button style={{...s.bp,width:36,height:36,borderRadius:8,fontSize:20,flexShrink:0}}
                  onClick={()=>{
                    const sel=document.getElementById("prod-add-sel");
                    if(sel&&sel.value) setEditProds(prev=>[...prev,{nombre:sel.value,cantidad:1}]);
                  }}>+</button>
              </div>
            </div>
            <div style={{display:"flex",gap:8,marginTop:14}}>
              <button style={{...s.bwsp,marginTop:0,flex:1}} onClick={guardarEdicionPedido}>✅ Guardar Cambios</button>
              <button style={{...s.br,flex:1}} onClick={()=>setEditPedido(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {detalle&&(
        <div style={s.ov} onClick={()=>setDetalle(null)}>
          <div style={s.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:16,color:"#1a1a2e",marginBottom:14}}>Pedido {detalle.id}</div>
            {[["Tienda",detalle.tienda],["Hora",detalle.hora],["Ruta",detalle.ruta],["Chofer",detalle.chofer]].map(([k,v])=>(
              <div key={k} style={{fontSize:13,marginBottom:8}}><b>{k}:</b> {v}</div>
            ))}
            <div style={{fontSize:13,marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
              <b>Estado:</b>
              <span style={{...s.badge,background:ESTADOS[detalle.estado].bg,color:ESTADOS[detalle.estado].color}}>{ESTADOS[detalle.estado].label}</span>
            </div>
            <div style={{fontSize:13,fontWeight:700,marginBottom:6}}>Productos:</div>
            {detalle.productos.map(p=><div key={p.nombre} style={s.ci}><span>{p.nombre}</span><strong>{p.cantidad} bultos</strong></div>)}
            <button style={s.bwsp} onClick={()=>setDetalle(null)}>Cerrar</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
