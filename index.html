// ===== ADMIN PANEL COMPONENT =====
function AdminPanel({usuario, usuarios, mostrarNotif, historial, archivarSemana}) {
  const [nuevoNombre, setNuevoNombre] = useState("");
  const [nuevoPass, setNuevoPass] = useState("");
  const [nuevoRol, setNuevoRol] = useState("tienda");
  const [nuevoPermisos, setNuevoPermisos] = useState([...PERMISOS_ROL.tienda]);
  const [editando, setEditando] = useState(null);
  const [editData, setEditData] = useState({});

  const agregarUsuario = () => {
    if(!nuevoNombre||!nuevoPass){mostrarNotif("Completa nombre y contrasena","err");return;}
    const id = nuevoNombre.toLowerCase().replace(/[^a-z0-9]/g,"_")+Date.now();
    db.collection("usuarios").doc(id).set({nombre:nuevoNombre,password:nuevoPass,rol:nuevoRol,permisos:nuevoPermisos});
    setNuevoNombre(""); setNuevoPass(""); setNuevoRol("tienda"); setNuevoPermisos([...PERMISOS_ROL.tienda]);
    mostrarNotif("Usuario "+nuevoNombre+" agregado");
  };

  const eliminarUsuario = (id) => {
    if(id==="admin"){mostrarNotif("No puedes eliminar al admin","err");return;}
    db.collection("usuarios").doc(id).delete();
    mostrarNotif("Usuario eliminado");
  };

  const iniciarEdicion = (u) => {
    setEditando(u.id);
    setEditData({nombre:u.nombre,password:u.password,rol:u.rol,permisos:[...(u.permisos||PERMISOS_ROL[u.rol]||[])]});
  };

  const guardarEdicion = () => {
    db.collection("usuarios").doc(editando).update(editData);
    setEditando(null);
    mostrarNotif("Usuario actualizado");
  };

  const coloresRol = {admin:"#dc2626",almacen:"#8b5cf6",chofer:"#f97316",tienda:"#3b82f6"};

  return (
    <div style={{display:"flex",gap:14,flexWrap:"wrap",alignItems:"flex-start"}}>
      <div style={{flex:1,minWidth:280}}>
        <div style={s.card}>
          <div style={s.ct}>Agregar Usuario</div>
          <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:11}}>
            <input type="text" placeholder="Nombre completo" style={{...s.sel,padding:"8px 11px"}} value={nuevoNombre} onChange={e=>setNuevoNombre(e.target.value)}/>
            <input type="text" placeholder="Contrasena" style={{...s.sel,padding:"8px 11px"}} value={nuevoPass} onChange={e=>setNuevoPass(e.target.value)}/>
            <select style={{...s.sel,padding:"8px 11px"}} value={nuevoRol} onChange={e=>{setNuevoRol(e.target.value);setNuevoPermisos([...(PERMISOS_ROL[e.target.value]||[])]);} }>
              <option value="tienda">Tienda</option>
              <option value="almacen">Almacen</option>
              <option value="chofer">Chofer</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div style={{fontWeight:700,fontSize:11,color:"#374151",marginBottom:7}}>Permisos:</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:11}}>
            {PERMISOS_LIST.map(([key,label])=>(
              <div key={key} onClick={()=>setNuevoPermisos(prev=>prev.includes(key)?prev.filter(p=>p!==key):[...prev,key])}
                style={{padding:"3px 9px",borderRadius:20,fontSize:10,fontWeight:600,cursor:"pointer",background:nuevoPermisos.includes(key)?"#1a1a2e":"#f3f4f6",color:nuevoPermisos.includes(key)?"#fbbf24":"#6b7280"}}>
                {label}
              </div>
            ))}
          </div>
          <button style={s.bwsp} onClick={agregarUsuario}>+ Agregar Usuario</button>
        </div>
      </div>
      <div style={{flex:1,minWidth:280}}>
        <div style={s.card}>
          <div style={s.ct}>Usuarios ({usuarios.length})</div>
          {usuarios.map(u=>(
            <div key={u.id} style={{padding:"10px 0",borderBottom:"1px solid #f3f4f6"}}>
              {editando===u.id ? (
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  <input type="text" style={{...s.sel,padding:"6px 9px",fontSize:12}} value={editData.nombre} onChange={e=>setEditData(d=>({...d,nombre:e.target.value}))}/>
                  <input type="text" placeholder="Nueva contrasena" style={{...s.sel,padding:"6px 9px",fontSize:12}} value={editData.password} onChange={e=>setEditData(d=>({...d,password:e.target.value}))}/>
                  <select style={{...s.sel,padding:"6px 9px",fontSize:12}} value={editData.rol} onChange={e=>setEditData(d=>({...d,rol:e.target.value,permisos:[...(PERMISOS_ROL[e.target.value]||[])]}))}>
                    <option value="tienda">Tienda</option>
                    <option value="almacen">Almacen</option>
                    <option value="chofer">Chofer</option>
                    <option value="admin">Admin</option>
                  </select>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                    {PERMISOS_LIST.map(([key,label])=>(
                      <div key={key} onClick={()=>setEditData(d=>({...d,permisos:d.permisos.includes(key)?d.permisos.filter(p=>p!==key):[...d.permisos,key]}))}
                        style={{padding:"2px 7px",borderRadius:20,fontSize:9,fontWeight:600,cursor:"pointer",background:editData.permisos.includes(key)?"#1a1a2e":"#f3f4f6",color:editData.permisos.includes(key)?"#fbbf24":"#6b7280"}}>
                        {label}
                      </div>
                    ))}
                  </div>
                  <div style={{display:"flex",gap:5,marginTop:5}}>
                    <button style={{...s.bwsp,marginTop:0,flex:1,padding:"7px"}} onClick={guardarEdicion}>Guardar</button>
                    <button style={{...s.br,flex:1}} onClick={()=>setEditando(null)}>Cancelar</button>
                  </div>
                </div>
              ) : (
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:12,color:"#1a1a2e"}}>{u.nombre}</div>
                    <div style={{fontSize:10,marginTop:2}}>
                      <span style={{fontWeight:700,color:coloresRol[u.rol]||"#374151"}}>{u.rol}</span>
                      <span style={{color:"#9ca3af"}}> · Clave: {u.password}</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:2,marginTop:3}}>
                      {(u.permisos||PERMISOS_ROL[u.rol]||[]).map(p=>{ const l=PERMISOS_LIST.find(x=>x[0]===p); return l?<span key={p} style={{background:"#f3f4f6",borderRadius:20,padding:"1px 6px",fontSize:9,color:"#374151"}}>{l[1]}</span>:null; })}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:3}}>
                    <button style={{...s.ba,fontSize:10,padding:"3px 7px"}} onClick={()=>iniciarEdicion(u)}>Editar</button>
                    {u.id!=="admin"&&<button style={{...s.br,fontSize:10,padding:"3px 7px"}} onClick={()=>eliminarUsuario(u.id)}>X</button>}
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* HISTORIAL SEMANAL Y COMPARATIVO MENSUAL */}
      <div style={{flex:"1 1 100%",minWidth:280}}>
        <div style={s.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
            <div style={{fontWeight:800,fontSize:13,color:"#1a1a2e"}}>📊 Historial Semanal (solo tú)</div>
            <button style={{...s.bwsp,marginTop:0,width:"auto",padding:"7px 14px",background:"#dc2626"}} onClick={archivarSemana}>
              🗑️ Cerrar y Archivar Semana
            </button>
          </div>
          <div style={{fontSize:11,color:"#6b7280",marginBottom:11}}>
            Cierra la semana actual (Lunes-Domingo), guarda el resumen y limpia los pedidos entregados de Firebase.
          </div>

          {historial.length === 0
            ? <div style={s.empty}>Sin semanas archivadas aún</div>
            : (
              <div>
                <div style={{overflowX:"auto",marginBottom:14}}>
                  <table style={{...s.tabla,fontSize:11}}>
                    <thead><tr style={{background:"#f8f7f4"}}>
                      <th style={s.th}>Semana</th>
                      <th style={s.th}>Pedidos</th>
                      <th style={s.th}>Piezas Totales</th>
                    </tr></thead>
                    <tbody>
                      {historial.map(h=>(
                        <tr key={h.id} style={{borderBottom:"1px solid #f3f4f6"}}>
                          <td style={s.td}><strong>{h.weekKey}</strong></td>
                          <td style={s.td}>{h.totalPedidos}</td>
                          <td style={s.td}>{h.totalPiezas}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <button style={{...s.btnExcel,background:"#7c3aed"}} onClick={()=>{
                  // Construir hoja comparativa: filas = semanas, columnas = productos, con grafica
                  const todosLosProductos = [...new Set(historial.flatMap(h=>Object.keys(h.productos||{})))];
                  const headerRow = ["Semana","Total Pedidos","Total Piezas",...todosLosProductos];
                  const dataRows = historial.slice().reverse().map(h=>{
                    const row = [h.weekKey, h.totalPedidos, h.totalPiezas];
                    todosLosProductos.forEach(p=> row.push((h.productos||{})[p]||0));
                    return row;
                  });
                  const ws = XLSX.utils.aoa_to_sheet([headerRow,...dataRows]);
                  ws["!cols"] = [{wch:12},{wch:14},{wch:14},...todosLosProductos.map(()=>({wch:14}))];

                  const wb = XLSX.utils.book_new();
                  XLSX.utils.book_append_sheet(wb, ws, "Comparativo Semanal");

                  // Hoja 2: detalle por tienda de cada semana
                  const tiendaRows = historial.flatMap(h =>
                    Object.entries(h.tiendas||{}).map(([tienda,piezas]) => ({
                      "Semana": h.weekKey, "Tienda": tienda, "Piezas Entregadas": piezas
                    }))
                  );
                  const wsTiendas = XLSX.utils.json_to_sheet(tiendaRows.length?tiendaRows:[{"Semana":"Sin datos"}]);
                  XLSX.utils.book_append_sheet(wb, wsTiendas, "Por Tienda");

                  // Crear grafica de columnas (chart) usando datos de productos por semana
                  try {
                    const chartData = dataRows.map((row,i) => ({name: row[0], values: row.slice(3)}));
                    // SheetJS community no soporta charts nativos; se exportan los datos listos para graficar en Excel
                  } catch(e) {}

                  XLSX.writeFile(wb, `Comparativo_Mensual_Vaquero.xlsx`);
                  mostrarNotif("✅ Excel comparativo descargado — selecciona datos e Insertar > Gráfica en Excel");
                }}>📈 Descargar Comparativo Mensual (Excel)</button>
              </div>
            )
          }
        </div>
      </div>
    </div>
  );
}

    });
    const unsubH = db.collection("historial_semanal").orderBy("weekKey","desc").onSnapshot(snap=>{
      setHistorial(snap.docs.map(d=>({id:d.id,...d.data()})));

    return ()=>{ unsubP(); unsubC(); unsubU(); unsubH(); };

        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:3}}>Contrasena</div>
          <input type="password" placeholder="..." style={{width:"100%",padding:"9px 11px",borderRadius:7,border:"1.5px solid #e5e7eb",fontFamily:"inherit",fontSize:13}} value={loginPass} onChange={e=>setLoginPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/>

  const sub = (p)=>setCarrito(c=>{ const n={...c}; if(n[p.id]>1)n[p.id]--; else delete n[p.id]; return n; });
  const total = Object.values(carrito).reduce((a,b)=>a+b,0);

  const enviar = async () => {
    const items = Object.entries(carrito).map(([id,cantidad])=>{ const p=PRODUCTOS.find(x=>x.id===parseInt(id)); return {nombre:p.nombre,unidad:p.unidad,cantidad}; });
    if(!items.length){mostrarNotif("Agrega productos","err");return;}
    const hora=genHora(), ruta=getRuta(tienda);
    const nuevo={tienda,hora,estado:"pendiente",productos:items.map(i=>({nombre:i.nombre,cantidad:i.cantidad})),chofer:"Sin asignar",ruta,creadoPor:usuario.nombre,timestamp:firebase.firestore.FieldValue.serverTimestamp()};
    await db.collection("pedidos").add(nuevo);
    setCarrito({});
    const lineas=items.map(i=>"- "+i.nombre+" x"+i.cantidad).join("\n");
    const msg="PEDIDO VAQUERO\n"+tienda+"\n"+hora+"\n\n"+lineas+"\n\nRuta: "+ruta;
    navigator.clipboard.writeText(msg).catch(()=>{});
    mostrarNotif("Pedido enviado a "+ruta);
  };

  const avanzar = (pid) => {
    const orden=["pendiente","confirmado","en_carga","en_ruta","entregado"];
    const p=pedidos.find(x=>x.id===pid); if(!p)return;
    const next=orden[Math.min(orden.indexOf(p.estado)+1,orden.length-1)];
    const hora=genHora();
    db.collection("pedidos").doc(pid).update({estado:next,ultimaActualizacion:{usuario:usuario.nombre,accion:"-> "+ESTADOS[next].label,hora}});
  };

  const regresar = (pid) => {
    const orden=["pendiente","confirmado","en_carga","en_ruta","entregado"];
    const p=pedidos.find(x=>x.id===pid); if(!p)return;
    const prev=orden[Math.max(orden.indexOf(p.estado)-1,0)];
    const hora=genHora();
    db.collection("pedidos").doc(pid).update({estado:prev,ultimaActualizacion:{usuario:usuario.nombre,accion:"<- "+ESTADOS[prev].label,hora}});
    mostrarNotif("Regresado a "+ESTADOS[prev].label);
  };

  };

  const iniciarModoEnvio = () => {
    const td=pedidos.filter(p=>p.estado!=="entregado").map(p=>({id:p.id,tienda:p.tienda,ruta:p.ruta||"Sin ruta",activa:true,productos:(p.productos||[]).map(pr=>({...pr,tachado:false}))}));
    setEnvioTiendas(td); setEnvioIniciado(true);
  };

  // Obtener número de semana ISO y año
  const getWeekKey = (date = new Date()) => {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,"0")}`;
  };

  // Archivar semana actual a Firebase (historial permanente) y limpiar pedidos activos
  const archivarSemana = async () => {
    const weekKey = getWeekKey();
    const entregadosSemana = pedidos.filter(p => p.estado === "entregado");
    if(entregadosSemana.length === 0){ mostrarNotif("No hay entregas para archivar","err"); return; }

    // Sumar por producto y por tienda
    const resumenProductos = {};
    const resumenTiendas = {};
    entregadosSemana.forEach(p => {
      resumenTiendas[p.tienda] = (resumenTiendas[p.tienda]||0) + p.productos.reduce((s,x)=>s+x.cantidad,0);
      p.productos.forEach(prod => {
        resumenProductos[prod.nombre] = (resumenProductos[prod.nombre]||0) + prod.cantidad;
      });
    });

    await db.collection("historial_semanal").doc(weekKey).set({
      weekKey,
      fecha: new Date().toISOString(),
      totalPedidos: entregadosSemana.length,
      totalPiezas: Object.values(resumenProductos).reduce((a,b)=>a+b,0),
      productos: resumenProductos,
      tiendas: resumenTiendas
    }, { merge: true });

    // Borrar de Firestore los pedidos ya archivados
    const batch = db.batch();
    entregadosSemana.forEach(p => batch.delete(db.collection("pedidos").doc(p.id)));
    await batch.commit();

    mostrarNotif(`✅ Semana ${weekKey} archivada y limpiada`);

          <button style={{...s.br,fontSize:10}} onClick={()=>setUsuario(null)}>Salir</button>

                  {TIENDAS.map(t=><option key={t}>{t}</option>)}

                <div style={s.ct}>Catalogo de Productos</div>

                    <div key={p.id} style={s.pc}>
                      <div style={s.pn}>{p.nombre}</div>
                      <div style={s.pu}>{p.unidad}</div>

                        <button style={s.bm} onClick={()=>sub(p)}>-</button>

                {usuario.id==="admin"&&<div style={s.sc}><div style={{...s.sn,color:"#3b82f6"}}>{Object.values(totales).reduce((a,b)=>a+b,0)}</div><div style={s.sl}>Piezas x Entregar</div></div>}
              </div>
              <div style={s.card} id="hoja-desglose">
                <div style={{textAlign:"center",marginBottom:13}}>
                  <div style={{fontWeight:900,fontSize:14,color:"#1a1a2e"}}>MASHARI S.A. DE C.V. - DESGLOSE TIJUANA</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>Fecha: {fecha} | Pedidos activos: {pendientes.length}</div>
                </div>
                {pendientes.length===0?<div style={s.empty}>Todo entregado</div>:
                <div style={{overflowX:"auto"}}>
                  <table style={{...s.tabla,fontSize:11}}>
                    <thead>
                      <tr style={{background:"#1a1a2e"}}>
                        <th style={{...s.th,color:"#fbbf24"}}>#</th>
                        <th style={{...s.th,color:"#fbbf24"}}>DULCERIA</th>
                        {prodUsados.map(p=><th key={p} style={{...s.th,color:"#fbbf24",textAlign:"center",fontSize:9}}>{p.replace(" Vaquero","").replace("Churritos ","Ch.").replace("Fritura Surtida","Frit.").trim()}</th>)}
                        <th style={{...s.th,color:"#fbbf24",textAlign:"center"}}>ESTADO</th>
                        <th style={{...s.th,color:"#fbbf24"}}>CAMBIOS</th>
                      </tr>
                    </thead>
                    <tbody>
                      {pendientes.map((p,i)=>(
                        <tr key={p.id} style={{borderBottom:"1px solid #f3f4f6",background:i%2===0?"#fff":"#fafafa"}}>
                          <td style={{...s.td,fontWeight:700,color:"#9ca3af"}}>{i+1}</td>
                          <td style={{...s.td,fontWeight:700,color:"#1a1a2e",whiteSpace:"nowrap"}}>
                            {p.tienda.replace("DULFI ","").replace("MEGA ","")}
                            <div style={{fontSize:9,color:"#9ca3af",fontWeight:400}}>{p.ruta}</div>
                          </td>
                          {prodUsados.map(prod=>{ const f=p.productos.find(x=>x.nombre===prod); return <td key={prod} style={{...s.td,textAlign:"center",fontWeight:f?800:400,color:f?"#1a1a2e":"#e5e7eb"}}>{f?f.cantidad:"-"}</td>; })}
                          <td style={{...s.td,textAlign:"center"}}>

                        <td style={{...s.td,fontWeight:900,color:"#92400e"}} colSpan={2}>TOTAL</td>

        {/* MODO ENVIO - pantalla inicio */}

            </button>

        {/* MODO ENVIO - tabla interactiva */}
        {vista==="envio" && envioIniciado && (()=>{
          const tiendasActivas=envioTiendas.filter(t=>t.activa);
          const prodUsados=[...new Set(tiendasActivas.flatMap(t=>t.productos.map(p=>p.nombre)))];
          const totalesFijos={};
          prodUsados.forEach(prod=>{ totalesFijos[prod]=tiendasActivas.reduce((sum,t)=>{ const f=t.productos.find(p=>p.nombre===prod); return sum+(f?f.cantidad:0); },0); });
          const totalesPend={};
          prodUsados.forEach(prod=>{ totalesPend[prod]=tiendasActivas.reduce((sum,t)=>{ const f=t.productos.find(p=>p.nombre===prod&&!p.tachado); return sum+(f?f.cantidad:0); },0); });
          const totalG=tiendasActivas.reduce((sum,t)=>sum+t.productos.reduce((s,p)=>s+p.cantidad,0),0);
          const totalC=tiendasActivas.reduce((sum,t)=>sum+t.productos.filter(p=>p.tachado).reduce((s,p)=>s+p.cantidad,0),0);
          const totalP=totalG-totalC;
          const tiendaOk=(t)=>t.productos.every(p=>p.tachado);
          const togTienda=(id)=>setEnvioTiendas(prev=>prev.map(t=>t.id===id?{...t,activa:!t.activa}:t));
          const togProd=(tid,pnom)=>setEnvioTiendas(prev=>prev.map(t=>{ if(t.id!==tid)return t; return {...t,productos:t.productos.map(p=>p.nombre===pnom?{...p,tachado:!p.tachado}:p)}; }));
          return (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#1a1a2e",borderRadius:12,padding:"14px 18px",marginBottom:14,flexWrap:"wrap",gap:11}}>
                <div><div style={{color:"#fbbf24",fontWeight:900,fontSize:14}}>Modo Envio - Carga del Dia</div><div style={{color:"#94a3b8",fontSize:10,marginTop:1}}>Toca un numero para tacharlo</div></div>
                <div style={{display:"flex",gap:18,alignItems:"center",flexWrap:"wrap"}}>
                  <div style={{textAlign:"center"}}><div style={{color:"#fbbf24",fontWeight:900,fontSize:22}}>{totalG}</div><div style={{color:"#94a3b8",fontSize:9}}>TOTAL</div></div>
                  <div style={{width:1,height:32,background:"#ffffff22"}}/>
                  <div style={{textAlign:"center"}}><div style={{color:"#10b981",fontWeight:900,fontSize:22}}>{totalC}</div><div style={{color:"#94a3b8",fontSize:9}}>CARGADO</div></div>
                  <div style={{width:1,height:32,background:"#ffffff22"}}/>
                  <div style={{textAlign:"center"}}><div style={{color:"#f97316",fontWeight:900,fontSize:22}}>{totalP}</div><div style={{color:"#94a3b8",fontSize:9}}>PENDIENTE</div></div>
                  <button style={{...s.br,fontSize:10}} onClick={()=>setEnvioIniciado(false)}>Reiniciar</button>
                </div>
              </div>
              <div style={s.card}>
                <div style={s.ct}>Tiendas en esta carga</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                  {envioTiendas.map(t=>(
                    <div key={t.id} onClick={()=>togTienda(t.id)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:700,border:"2px solid",transition:"all .15s",borderColor:tiendaOk(t)&&t.activa?"#10b981":t.activa?"#1a1a2e":"#e5e7eb",background:tiendaOk(t)&&t.activa?"#d1fae5":t.activa?"#1a1a2e":"#f3f4f6",color:tiendaOk(t)&&t.activa?"#065f46":t.activa?"#fbbf24":"#9ca3af",textDecoration:tiendaOk(t)&&t.activa?"line-through":"none"}}>
                      {tiendaOk(t)&&t.activa?"OK ":!t.activa?"X ":""}{t.tienda.replace("DULFI ","").replace("MEGA ","")}
                    </div>
                  ))}
                </div>
              </div>
              <div style={s.card}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead>
                      <tr style={{background:"#1a1a2e"}}>
                        <th style={{...s.th,color:"#fbbf24",textAlign:"left"}}>#</th>
                        <th style={{...s.th,color:"#fbbf24",textAlign:"left"}}>DULCERIA</th>
                        {prodUsados.map(p=><th key={p} style={{...s.th,color:"#fbbf24",textAlign:"center",fontSize:9}}>{p.replace(" Vaquero","").replace("Churritos ","Ch.").replace("Fritura Surtida","Frit.").trim()}</th>)}
                        <th style={{...s.th,color:"#fbbf24",textAlign:"center"}}>ESTADO</th>
                      </tr>
                    </thead>
                    <tbody>
                      {tiendasActivas.map((t,i)=>(
                        <tr key={t.id} style={{borderBottom:"1px solid #f3f4f6",background:tiendaOk(t)?"#f0fdf4":i%2===0?"#fff":"#fafafa"}}>
                          <td style={{...s.td,color:"#9ca3af",fontWeight:700}}>{i+1}</td>
                          <td style={{...s.td,fontWeight:700,whiteSpace:"nowrap"}}>
                            <div style={{color:"#1a1a2e",textDecoration:tiendaOk(t)?"line-through":"none",opacity:tiendaOk(t)?0.5:1}}>{t.tienda.replace("DULFI ","").replace("MEGA ","")}</div>
                            <div style={{fontSize:9,color:"#9ca3af"}}>{t.ruta}</div>
                          </td>
                          {prodUsados.map(prod=>{ const f=t.productos.find(p=>p.nombre===prod); return (
                            <td key={prod} style={{...s.td,textAlign:"center"}} onClick={()=>f&&togProd(t.id,prod)}>
                              {f?(<span style={{display:"inline-block",fontWeight:800,fontSize:13,color:f.tachado?"#10b981":"#1a1a2e",textDecoration:f.tachado?"line-through":"none",cursor:"pointer",padding:"3px 7px",borderRadius:5,background:f.tachado?"#d1fae5":"#f3f4f6",minWidth:32,transition:"all .15s",userSelect:"none"}}>{f.cantidad}</span>):<span style={{color:"#e5e7eb"}}>-</span>}
                            </td>
                          );})}
                          <td style={{...s.td,textAlign:"center"}}>
                            {tiendaOk(t)?<span style={{background:"#d1fae5",color:"#065f46",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>Listo</span>:t.productos.some(p=>p.tachado)?<span style={{background:"#ffedd5",color:"#c2410c",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>Parcial</span>:<span style={{background:"#fef3c7",color:"#92400e",borderRadius:20,padding:"2px 8px",fontSize:10,fontWeight:700}}>Pendiente</span>}
                          </td>
                        </tr>
                      ))}
                      <tr style={{background:"#fef3c7",borderTop:"2px solid #f59e0b"}}>
                        <td style={{...s.td,fontWeight:900,color:"#92400e"}} colSpan={2}>TOTAL GENERAL</td>
                        {prodUsados.map(prod=><td key={prod} style={{...s.td,textAlign:"center",fontWeight:900,color:"#92400e",fontSize:14}}>{totalesFijos[prod]||"-"}</td>)}
                        <td style={s.td}></td>
                      </tr>
                      <tr style={{background:"#d1fae5",borderTop:"1px solid #6ee7b7"}}>
                        <td style={{...s.td,fontWeight:900,color:"#065f46"}} colSpan={2}>CARGADO</td>
                        {prodUsados.map(prod=>{ const car=tiendasActivas.reduce((sum,t)=>{ const f=t.productos.find(p=>p.nombre===prod&&p.tachado); return sum+(f?f.cantidad:0); },0); return <td key={prod} style={{...s.td,textAlign:"center",fontWeight:900,color:"#065f46",fontSize:14}}>{car>0?car:"-"}</td>; })}
                        <td style={s.td}></td>
                      </tr>
                      <tr style={{background:"#ffedd5",borderTop:"1px solid #fed7aa"}}>
                        <td style={{...s.td,fontWeight:900,color:"#c2410c"}} colSpan={2}>PENDIENTE</td>
                        {prodUsados.map(prod=><td key={prod} style={{...s.td,textAlign:"center",fontWeight:900,color:"#c2410c",fontSize:14}}>{totalesPend[prod]>0?totalesPend[prod]:<span style={{textDecoration:"line-through",color:"#10b981"}}>0</span>}</td>)}
                        <td style={s.td}></td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ADMIN */}
        {vista==="admin" && usuario.rol==="admin" && <AdminPanel usuario={usuario} usuarios={usuarios} mostrarNotif={mostrarNotif} historial={historial} archivarSemana={archivarSemana}/>}

      </main>

      {/* MODAL EDITAR PEDIDO */}
      {editPedido&&(
        <div style={s.ov} onClick={()=>setEditPedido(null)}>
          <div style={s.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:15,color:"#1a1a2e",marginBottom:3}}>Editar Pedido</div>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:14}}>{editPedido.tienda} - {editPedido.hora}</div>
            {editProds.map((prod,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f3f4f6"}}>
                <div style={{fontSize:12,fontWeight:600,color:"#374151",flex:1}}>{prod.nombre}</div>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <button style={s.bm} onClick={()=>setEditProds(prev=>prev.map((x,j)=>j===i?{...x,cantidad:Math.max(0,x.cantidad-1)}:x))}>-</button>
                  <input type="number" min="0" style={{width:50,textAlign:"center",fontWeight:800,fontSize:14,border:"1.5px solid #e5e7eb",borderRadius:5,padding:"2px 3px",fontFamily:"inherit"}} value={prod.cantidad} onChange={e=>setEditProds(prev=>prev.map((x,j)=>j===i?{...x,cantidad:parseInt(e.target.value)||0}:x))}/>
                  <button style={s.bp} onClick={()=>setEditProds(prev=>prev.map((x,j)=>j===i?{...x,cantidad:x.cantidad+1}:x))}>+</button>
                </div>
              </div>
            ))}
            <div style={{marginTop:11,paddingTop:11,borderTop:"2px dashed #f3f4f6"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:7}}>Agregar producto:</div>
              <div style={{display:"flex",gap:5}}>
                <select id="prod-add" style={{...s.sel,flex:1,padding:"6px 7px",fontSize:11}}>
                  {PRODUCTOS.filter(p=>!editProds.find(x=>x.nombre===p.nombre)).map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}
                </select>
                <button style={{...s.bp,width:32,height:32,borderRadius:7,fontSize:18,flexShrink:0}} onClick={()=>{ const sel=document.getElementById("prod-add"); if(sel&&sel.value)setEditProds(prev=>[...prev,{nombre:sel.value,cantidad:1}]); }}>+</button>
              </div>
            </div>
            <div style={{display:"flex",gap:7,marginTop:13}}>
              <button style={{...s.bwsp,marginTop:0,flex:1}} onClick={guardarEdicionPedido}>Guardar Cambios</button>
              <button style={{...s.br,flex:1}} onClick={()=>setEditPedido(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL DETALLE */}
      {detalle&&(
        <div style={s.ov} onClick={()=>setDetalle(null)}>
          <div style={s.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontWeight:900,fontSize:15,color:"#1a1a2e",marginBottom:13}}>Detalle Pedido</div>
            {[["Tienda",detalle.tienda],["Hora",detalle.hora],["Ruta",detalle.ruta],["Chofer",detalle.chofer],["Creado por",detalle.creadoPor]].map(([k,v])=>(
              <div key={k} style={{fontSize:12,marginBottom:7}}><b>{k}:</b> {v||"-"}</div>
            ))}
            <div style={{fontSize:12,marginBottom:7,display:"flex",alignItems:"center",gap:7}}><b>Estado:</b><span style={{...s.badge,background:ESTADOS[detalle.estado].bg,color:ESTADOS[detalle.estado].color}}>{ESTADOS[detalle.estado].label}</span></div>
            <div style={{fontSize:12,fontWeight:700,marginBottom:5}}>Productos:</div>
            {detalle.productos.map(p=><div key={p.nombre} style={s.ci}><span>{p.nombre}</span><strong>{p.cantidad} bultos</strong></div>)}
            <button style={s.bwsp} onClick={()=>setDetalle(null)}>Cerrar</button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
